name: Deploy Riwaya to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2222
          script: |
            # Aller dans le dossier, le créer s'il n'existe pas
            mkdir -p /var/www/riwayama
            cd /var/www/riwayama
            
            # Initialisation robuste de Git si absente
            if [ ! -d ".git" ]; then
              echo "🔧 Initialisation du dépôt Git..."
              git init
              git remote add origin https://github.com/reda7171/riwaya.git
            fi

            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S git config --global --add safe.directory /var/www/riwayama
            
            # Forcer la synchronisation avec le repo distant
            echo "📥 Récupération des derniers changements..."
            git fetch origin main
            git reset --hard origin/main
            
            # Permissions et Cron
            echo "🔐 Configuration des permissions et Cron..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S chmod +x scripts/backup-db.sh
            (crontab -l 2>/dev/null | grep -q "backup-db.sh") || (crontab -l 2>/dev/null; echo "0 3 * * * /var/www/riwayama/scripts/backup-db.sh >> /var/www/riwayama/backups/backup.log 2>&1") | crontab -
            
            # Rebuild et Restart UNIQUEMENT le service 'app'
            echo "🚀 Rechargement du service application..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S docker-compose up -d --build app
