version: "3.8"

services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube_global
    depends_on:
      - db_sonar
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db_sonar:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_secure_password
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: always

  db_sonar:
    image: postgres:15
    container_name: postgres_sonar
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_secure_password
      - POSTGRES_DB=sonarqube
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    restart: always

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgres_sonar_data:
