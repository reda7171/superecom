version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: riwaya_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: riwaya_db
      MYSQL_USER: riwaya_user
      MYSQL_PASSWORD: riwaya_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - riwaya_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: riwaya_pma
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: riwaya_user
      PMA_PASSWORD: riwaya_pass
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - riwaya_network

volumes:
  mysql_data:


networks:
  riwaya_network:
    driver: bridge
